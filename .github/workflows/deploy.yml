name: Build and Deploy Blazor WASM

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-and-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore project
        run: dotnet restore Engawa/Engawa.csproj

      - name: Build project
        run: dotnet build Engawa/Engawa.csproj --configuration Release --no-restore

      - name: Run tests (if any)
        run: |
          set -e
          TEST=$(git ls-files "**/*Tests.csproj" "**/*Test*.csproj" | head -n 1 || true)
          if [ -n "$TEST" ]; then
            echo "Found test project: $TEST"
            dotnet test --no-build --verbosity normal
          else
            echo "No test project found, skipping tests."
          fi

      - name: Publish project
        run: dotnet publish Engawa/Engawa.csproj -c Release -o publish

      - name: Verify publish output
        run: |
          if [ ! -f publish/wwwroot/index.html ]; then
            echo "ERROR: publish/wwwroot/index.html not found" >&2
            ls -la publish || true
            exit 1
          fi

      - name: Deploy to GitHub Pages (public branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish/wwwroot
          publish_branch: public
          allow_empty_commit: false
          # keep_files=false will remove files on the target branch before publishing (clean behavior)
          keep_files: false
          # If your repository branch protection disallows pushes from GitHub Actions,
          # consider using a dedicated deploy key or allow GitHub Actions to push.

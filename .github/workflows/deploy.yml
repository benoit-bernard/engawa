name: Build and Deploy Blazor WASM

on:
  push:
    branches:
      - main  # Déclenche à chaque push sur main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Installer .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 7.0.x  # adapte si ton projet est sur une autre version

      # 3️⃣ Restaurer les packages NuGet
      - name: Restore dependencies
        run: dotnet restore

      # 4️⃣ Compiler le projet
      - name: Build project
        run: dotnet build --configuration Release

      # 5️⃣ Publier Blazor WASM
      - name: Publish project
        run: dotnet publish -c Release -o publish

      # 6️⃣ Déployer sur la branche public
      - name: Deploy to GitHub Pages (public branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish/wwwroot
          publish_branch: public